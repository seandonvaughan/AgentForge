  <div class="page" id="page-branches" hidden>
    <div class="page-header">
      <h2>Autonomous Branches</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="branches-bulk-delete-btn" class="export-btn"
          style="color:var(--red);border-color:rgba(248,81,73,0.4);display:none"
          onclick="window._bulkDeleteStale()">🗑 Delete All Stale</button>
        <button class="export-btn" onclick="window.loadBranchesPage()">&#8635; Refresh</button>
      </div>
    </div>

    <!-- Summary stats -->
    <div class="tasks-summary-row">
      <div class="tasks-summary-card">
        <div class="tasks-summary-label">Total</div>
        <div class="tasks-summary-value" id="branches-stat-total">—</div>
      </div>
      <div class="tasks-summary-card">
        <div class="tasks-summary-label">Open PR</div>
        <div class="tasks-summary-value" id="branches-stat-open" style="color:var(--blue)">—</div>
      </div>
      <div class="tasks-summary-card">
        <div class="tasks-summary-label">Merged</div>
        <div class="tasks-summary-value" id="branches-stat-merged" style="color:var(--green)">—</div>
      </div>
      <div class="tasks-summary-card">
        <div class="tasks-summary-label">Stale</div>
        <div class="tasks-summary-value" id="branches-stat-stale" style="color:var(--red)">—</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="task-filter-bar" style="margin-bottom:16px;">
      <input type="search" id="branches-search"
        placeholder="Search branch or cycle…"
        oninput="window._filterBranchesTable()"
        style="flex:1;min-width:180px">
      <select id="branches-filter-status" onchange="window._filterBranchesTable()">
        <option value="">All Statuses</option>
        <option value="open_pr">Open PR</option>
        <option value="active">Active</option>
        <option value="merged">Merged</option>
        <option value="stale">Stale</option>
      </select>
    </div>

    <!-- Loading / error states -->
    <div id="branches-loading" class="skeleton-loader" hidden>Loading branches…</div>
    <div id="branches-error" class="error-state" hidden>
      <p id="branches-error-msg">Failed to load branches.</p>
      <button onclick="window.loadBranchesPage()">Retry</button>
    </div>

    <!-- Branches table -->
    <div class="tasks-table-wrap" id="branches-table-wrap" hidden>
      <table class="tasks-table">
        <thead>
          <tr>
            <th>Branch</th>
            <th>Cycle</th>
            <th>Age</th>
            <th>Status</th>
            <th>PR</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="branches-tbody"></tbody>
      </table>
    </div>

    <div id="branches-empty" class="empty-state" hidden>No autonomous/* branches found.</div>
    <div id="branches-filter-empty" class="empty-state" hidden>No branches match the current filter.</div>
  </div><!-- /page-branches -->

  <!-- ── Branches page JS ────────────────────────────── -->
<script>
(function() {
  'use strict';

  /**
   * Status → { badge CSS class, label }
   *
   * Uses the shared .status-badge variants defined in index.html:
   *   .active   = green   (branch is active / recently pushed)
   *   .in-progress = blue (has an open PR)
   *   .complete = green   (merged)
   *   .error    = red     (stale — no PR and >30 days old)
   *   .idle     = muted   (unknown)
   */
  var STATUS_META = {
    open_pr: { cls: 'in-progress', label: 'Open PR'  },
    merged:  { cls: 'complete',    label: 'Merged'   },
    stale:   { cls: 'error',       label: 'Stale'    },
    active:  { cls: 'active',      label: 'Active'   },
  };

  /** All branches fetched from the API — kept so filters can re-render without a new fetch. */
  var _allBranches = [];

  /** Create a plain text element of a given tag with optional opts. */
  function el(tag, text, opts) {
    var node = document.createElement(tag);
    if (opts && opts.cls)   node.className   = opts.cls;
    if (opts && opts.style) node.style.cssText = opts.style;
    if (opts && opts.title) node.title       = opts.title;
    if (text != null)       node.textContent = text;
    return node;
  }

  /** Create a <td> containing a single child node. */
  function td(child, style) {
    var cell = document.createElement('td');
    if (style) cell.style.cssText = style;
    if (child != null) cell.appendChild(child);
    return cell;
  }

  /** Build the status badge <span> for a given status key. */
  function makeStatusBadge(status) {
    var meta = STATUS_META[status] || { cls: 'idle', label: status };
    return el('span', meta.label, { cls: 'status-badge ' + meta.cls });
  }

  /**
   * Derive an age-based color token so stale/old branches are visually distinct.
   *   < 7 days  → text-secondary (neutral)
   *   7–30 days → orange
   *   > 30 days → red
   */
  function ageColor(ageMs) {
    var days = ageMs / (1000 * 60 * 60 * 24);
    if (days > 30) return 'var(--red)';
    if (days > 7)  return 'var(--orange)';
    return 'var(--text-secondary)';
  }

  /** Build the PR link (or a dash placeholder) for a branch's PR info. */
  function makePrNode(pr) {
    if (!pr) {
      return el('span', '—', { style: 'color:var(--text-muted);font-family:var(--font-mono);font-size:11px' });
    }
    var stateColor = pr.state === 'OPEN'   ? 'var(--blue)'
                   : pr.state === 'MERGED' ? 'var(--green)'
                   : 'var(--text-muted)';
    var a = document.createElement('a');
    a.textContent = '#' + pr.number;
    a.title       = pr.title + ' (' + pr.state + ')';
    a.target      = '_blank';
    a.rel         = 'noopener';
    a.style.cssText = 'color:' + stateColor + ';font-family:var(--font-mono);font-size:11px;' +
                      'text-decoration:none;font-weight:600';
    // Construct a best-effort GitHub search URL using the PR title prefix.
    a.href = 'https://github.com/pulls?q=is%3Apr+' + encodeURIComponent(pr.title.slice(0, 40));
    return a;
  }

  /** Build the delete button for stale/merged branches, or a dash for others. */
  function makeDeleteBtn(branchName, canDelete) {
    if (!canDelete) {
      return el('span', '—', { style: 'color:var(--text-muted);font-family:var(--font-mono);font-size:10px' });
    }
    var btn = document.createElement('button');
    btn.textContent = 'Delete';
    btn.title       = 'Delete branch ' + branchName;
    btn.style.cssText =
      'font-family:var(--font-mono);font-size:11px;font-weight:700;padding:4px 10px;' +
      'border-radius:3px;border:1px solid rgba(248,81,73,0.35);background:var(--red-dim);' +
      'color:var(--red);cursor:pointer;transition:all 0.15s';
    btn.addEventListener('mouseenter', function() { btn.style.background = 'rgba(248,81,73,0.25)'; });
    btn.addEventListener('mouseleave', function() { btn.style.background = 'var(--red-dim)'; });
    btn.addEventListener('click', function() { window._deleteBranch(branchName, btn); });
    return btn;
  }

  /** Build one <tr> for a single branch record. */
  function makeRow(b) {
    var canDelete = (b.status === 'stale' || b.status === 'merged');

    var row = document.createElement('tr');
    row.dataset.branch = b.name;
    row.dataset.status = b.status;

    // Branch name — mono, truncated with title for long names
    var nameSpan = el('span', b.name, {
      style: 'font-family:var(--font-mono);font-size:12px;max-width:280px;display:inline-block;' +
             'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle',
      title: b.name,
    });

    // Cycle — mono, purple accent
    var cycleSpan = el('span', b.cycle, {
      style: 'font-family:var(--font-mono);font-size:12px;color:var(--purple);font-weight:600',
    });

    // Age — color-coded by staleness
    var ageSpan = el('span', b.age, {
      style: 'font-family:var(--font-mono);font-size:12px;color:' + ageColor(b.ageMs || 0),
      title: b.createdAt || '',
    });

    row.appendChild(td(nameSpan));
    row.appendChild(td(cycleSpan));
    row.appendChild(td(ageSpan));
    row.appendChild(td(makeStatusBadge(b.status)));
    row.appendChild(td(makePrNode(b.pr)));
    row.appendChild(td(makeDeleteBtn(b.name, canDelete), 'text-align:right'));

    return row;
  }

  /** Apply current filter/search values and re-render visible rows. */
  window._filterBranchesTable = function() {
    var q      = (document.getElementById('branches-search')       || {}).value || '';
    var status = (document.getElementById('branches-filter-status')|| {}).value || '';
    var qLow   = q.toLowerCase();

    var filtered = _allBranches.filter(function(b) {
      var matchQ = !qLow || b.name.toLowerCase().includes(qLow) || b.cycle.toLowerCase().includes(qLow);
      var matchS = !status || b.status === status;
      return matchQ && matchS;
    });

    var tbody   = document.getElementById('branches-tbody');
    var wrapEl  = document.getElementById('branches-table-wrap');
    var emptyEl = document.getElementById('branches-empty');
    var fEmptyEl= document.getElementById('branches-filter-empty');

    if (!tbody) return;
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

    if (!_allBranches.length) {
      if (emptyEl)  emptyEl.hidden  = false;
      if (fEmptyEl) fEmptyEl.hidden = true;
      if (wrapEl)   wrapEl.hidden   = true;
      return;
    }

    if (emptyEl) emptyEl.hidden = true;

    if (!filtered.length) {
      if (fEmptyEl) fEmptyEl.hidden = false;
      if (wrapEl)   wrapEl.hidden   = true;
      return;
    }

    if (fEmptyEl) fEmptyEl.hidden = true;
    if (wrapEl)   wrapEl.hidden   = false;

    var frag = document.createDocumentFragment();
    filtered.forEach(function(b) { frag.appendChild(makeRow(b)); });
    tbody.appendChild(frag);
  };

  /** Update the four summary stat chips. */
  function updateStats(branches) {
    var total  = branches.length;
    var openPr = branches.filter(function(b) { return b.status === 'open_pr'; }).length;
    var merged = branches.filter(function(b) { return b.status === 'merged';  }).length;
    var stale  = branches.filter(function(b) { return b.status === 'stale';   }).length;

    var g = function(id) { return document.getElementById(id); };
    if (g('branches-stat-total'))  g('branches-stat-total').textContent  = total;
    if (g('branches-stat-open'))   g('branches-stat-open').textContent   = openPr;
    if (g('branches-stat-merged')) g('branches-stat-merged').textContent = merged;
    if (g('branches-stat-stale'))  g('branches-stat-stale').textContent  = stale;

    // Show/hide bulk-delete button when there are stale branches
    var bulkBtn = document.getElementById('branches-bulk-delete-btn');
    if (bulkBtn) bulkBtn.style.display = stale > 0 ? '' : 'none';
  }

  /** Fetch autonomous/* branches from the API and render the table. */
  window.loadBranchesPage = function() {
    var loadingEl = document.getElementById('branches-loading');
    var errorEl   = document.getElementById('branches-error');
    var wrapEl    = document.getElementById('branches-table-wrap');
    var emptyEl   = document.getElementById('branches-empty');
    var fEmptyEl  = document.getElementById('branches-filter-empty');

    if (loadingEl) loadingEl.hidden = false;
    if (errorEl)   errorEl.hidden   = true;
    if (wrapEl)    wrapEl.hidden    = true;
    if (emptyEl)   emptyEl.hidden   = true;
    if (fEmptyEl)  fEmptyEl.hidden  = true;

    fetch('/api/v1/branches')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(body) {
        if (loadingEl) loadingEl.hidden = true;
        _allBranches = (body && Array.isArray(body.data)) ? body.data : [];
        updateStats(_allBranches);
        window._filterBranchesTable();
      })
      .catch(function(err) {
        if (loadingEl) loadingEl.hidden = true;
        var msgEl = document.getElementById('branches-error-msg');
        if (msgEl) msgEl.textContent = 'Failed to load branches: ' + err.message;
        if (errorEl) errorEl.hidden = false;
      });
  };

  /**
   * Delete a single autonomous/* branch.
   * Only stale and merged branches surface a delete button; the server
   * also enforces the autonomous/* prefix as a safety constraint.
   */
  window._deleteBranch = function(branchName, btnEl) {
    if (!confirm('Delete branch ' + branchName + '?\nThis cannot be undone.')) return;

    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '…'; }

    fetch('/api/v1/branches/' + encodeURIComponent(branchName), { method: 'DELETE' })
      .then(function(r) {
        return r.json().then(function(body) { return { ok: r.ok, body: body }; });
      })
      .then(function(result) {
        if (!result.ok) {
          var msg = (result.body && result.body.error) ? result.body.error : 'Delete failed';
          alert('Error: ' + msg);
          if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Delete'; }
          return;
        }
        // Refresh so stats, row count, and bulk-delete button stay accurate
        window.loadBranchesPage();
      })
      .catch(function(err) {
        alert('Delete failed: ' + err.message);
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Delete'; }
      });
  };

  /**
   * Bulk-delete all stale branches in sequence.
   * Confirms once for the full batch; iterates and deletes each branch
   * serially to avoid hammering git with concurrent deletes.
   */
  window._bulkDeleteStale = function() {
    var staleBranches = _allBranches.filter(function(b) { return b.status === 'stale'; });
    if (!staleBranches.length) return;

    var names = staleBranches.map(function(b) { return b.name; });
    var msg   = 'Delete ' + names.length + ' stale branch' + (names.length === 1 ? '' : 'es') + '?\n\n' +
                names.join('\n') + '\n\nThis cannot be undone.';
    if (!confirm(msg)) return;

    var bulkBtn = document.getElementById('branches-bulk-delete-btn');
    if (bulkBtn) { bulkBtn.disabled = true; bulkBtn.textContent = 'Deleting…'; }

    // Serial deletion: chain Promises to avoid concurrent git branch -D calls
    var chain = Promise.resolve();
    names.forEach(function(name) {
      chain = chain.then(function() {
        return fetch('/api/v1/branches/' + encodeURIComponent(name), { method: 'DELETE' })
          .then(function(r) { return r.json(); })
          .catch(function() { /* swallow individual errors; a full refresh follows */ });
      });
    });

    chain.then(function() {
      // Re-enable button regardless — loadBranchesPage will hide it if no stale remain
      if (bulkBtn) { bulkBtn.disabled = false; bulkBtn.textContent = '🗑 Delete All Stale'; }
      window.loadBranchesPage();
    });
  };

})();
</script>
