  <script>
    /**
     * Approvals page — wired to:
     *   GET  /api/v5/cycles?limit=50       list cycles (hasApprovalPending + hasApprovalDecision flags)
     *   GET  /api/v5/cycles/:id/approval   fetch approval-pending.json for a cycle
     *   POST /api/v5/cycles/:id/approve    write approval-decision.json + broadcast SSE
     *
     * SSE-triggered refresh:
     *   window.loadApprovalsPage is exposed so the global approval-store SSE handler
     *   (index.html) can call it when 'approval.pending' or 'approval.decision' fires.
     *
     * Filter state held in _approvalFilterState; applyApprovalsFilter() re-renders
     * from the cached fetch without re-hitting the network.
     *
     * Approved/denied counts use hasApprovalDecision + approvalDecision from the
     * server response (v6.7.5+) — persists across page reloads, no session state needed.
     */

    var _approvalAllCycles   = [];
    var _approvalPendingData = [];    // [{ cycle, data }] fetched for pending cycles
    var _approvalFilterState = 'pending';

    /** Main entry — fetches cycle list then approval payloads for pending cycles. */
    async function loadApprovalsPage() {
      var listEl      = document.getElementById('approval-list');
      var refreshBtn  = document.getElementById('approvals-refresh-btn');

      // Show loading skeleton
      if (listEl) {
        listEl.textContent = '';
        var sk = document.createElement('div');
        sk.className   = 'skeleton-loader';
        sk.textContent = 'Loading…';
        listEl.appendChild(sk);
      }
      if (refreshBtn) {
        refreshBtn.disabled    = true;
        refreshBtn.textContent = '↻ Loading…';
      }

      try {
        // 1. List cycles — response now includes hasApprovalDecision + approvalDecision
        var res    = await fetch('/api/v5/cycles?limit=50');
        var json   = res.ok ? await res.json() : {};
        var cycles = json.cycles || [];
        _approvalAllCycles = cycles;

        // 2. Partition using server-side flags (persistent across reloads)
        var pendingCycles  = cycles.filter(function(c) { return c.hasApprovalPending; });
        var approvedCycles = cycles.filter(function(c) {
          return c.hasApprovalDecision && (c.approvalDecision === 'approved' || c.approvalDecision === 'partially_approved');
        });
        var deniedCycles   = cycles.filter(function(c) {
          return c.hasApprovalDecision && c.approvalDecision === 'rejected';
        });
        var totalCycles    = cycles.length;

        _setStatPill('approvals-pending-count',  pendingCycles.length);
        _setStatPill('approvals-approved-count', approvedCycles.length);
        _setStatPill('approvals-denied-count',   deniedCycles.length);
        _setStatPill('approvals-cycles-count',   totalCycles);

        // 3. Fetch approval payloads for each pending cycle
        var fetched = await Promise.all(
          pendingCycles.map(async function(c) {
            try {
              var r = await fetch('/api/v5/cycles/' + encodeURIComponent(c.cycleId) + '/approval');
              if (!r.ok) return null;
              var data = await r.json();
              return { cycle: c, data: data };
            } catch (ex) { return null; }
          })
        );
        _approvalPendingData = fetched.filter(Boolean);

        // 4. Render with current filter
        applyApprovalsFilter(_approvalFilterState);

      } catch (e) {
        console.error('loadApprovalsPage error:', e);
        if (listEl) {
          listEl.textContent = '';
          listEl.appendChild(_buildErrorState(e.message));
        }
      } finally {
        if (refreshBtn) {
          refreshBtn.disabled    = false;
          refreshBtn.textContent = '↻ Refresh';
        }
      }
    }

    /** Apply filter and re-render the list from cached data (no network). */
    function applyApprovalsFilter(filter) {
      _approvalFilterState = filter;
      var sel = document.getElementById('approvals-filter-select');
      if (sel) sel.value = filter;

      var listEl = document.getElementById('approval-list');
      if (!listEl) return;
      listEl.textContent = '';

      var items = [];

      if (filter === 'all' || filter === 'pending') {
        _approvalPendingData.forEach(function(p) {
          items.push({ kind: 'pending', cycle: p.cycle, data: p.data });
        });
      }
      if (filter === 'all' || filter === 'approved') {
        // Use server-side hasApprovalDecision + approvalDecision flags (persistent)
        _approvalAllCycles.forEach(function(c) {
          if (c.hasApprovalDecision &&
              (c.approvalDecision === 'approved' || c.approvalDecision === 'partially_approved')) {
            items.push({ kind: 'approved', cycle: c, data: null });
          }
        });
      }
      if (filter === 'all' || filter === 'denied') {
        _approvalAllCycles.forEach(function(c) {
          if (c.hasApprovalDecision && c.approvalDecision === 'rejected') {
            items.push({ kind: 'denied', cycle: c, data: null });
          }
        });
      }

      var countEl = document.getElementById('approvals-filter-count');
      if (countEl) {
        countEl.textContent = items.length + (items.length === 1 ? ' item' : ' items');
      }

      if (items.length === 0) {
        listEl.appendChild(_buildEmptyState(filter));
        return;
      }

      items.forEach(function(item) {
        if (item.kind === 'pending') {
          listEl.appendChild(_buildApprovalCard(item.cycle, item.data));
        } else {
          listEl.appendChild(_buildDecidedCard(item.cycle, item.kind));
        }
      });
    }

    /**
     * Build a pending approval card DOM node.
     * Contains: .approval-action, .priority-badge, .agent-chip, .approval-desc,
     *           budget bar, item lists, .btn-approve, .btn-deny
     */
    function _buildApprovalCard(cycle, data) {
      var withinItems   = (data.withinBudget && data.withinBudget.items)  ? data.withinBudget.items  : [];
      var overflowItems = (data.overflow     && data.overflow.items)      ? data.overflow.items      : [];
      var withinCost    = withinItems.reduce(function(s, i) { return s + (Number(i.estimatedCostUsd) || 0); }, 0);
      var budgetUsd     = Number(data.budgetUsd || 200);
      var hasOverflow   = overflowItems.length > 0;

      var card = document.createElement('div');
      card.className = 'approval-card status-pending';
      card.id        = 'approval-card-' + cycle.cycleId;

      // ── Top bar ──────────────────────────────────────────────
      var topbar = document.createElement('div');
      topbar.className = 'approval-card-topbar';

      var left = document.createElement('div');
      left.className = 'approval-card-left';

      var action = document.createElement('div');
      action.className   = 'approval-action';
      action.title       = cycle.cycleId;
      action.textContent = cycle.sprintVersion
        ? 'Sprint ' + cycle.sprintVersion
        : cycle.cycleId.slice(0, 12) + '\u2026';
      left.appendChild(action);

      var priority = document.createElement('span');
      priority.className   = 'priority-badge ' + (hasOverflow ? 'high' : 'medium');
      priority.textContent = hasOverflow ? 'OVERFLOW' : 'WITHIN BUDGET';
      left.appendChild(priority);

      var assigneeSource = overflowItems[0] || withinItems[0];
      var agentChip = document.createElement('span');
      agentChip.className   = 'agent-chip';
      agentChip.textContent = (assigneeSource && assigneeSource.suggestedAssignee)
        ? assigneeSource.suggestedAssignee
        : 'Budget Gate';
      left.appendChild(agentChip);

      topbar.appendChild(left);

      var badge = document.createElement('span');
      badge.className   = 'status-badge status-pending';
      badge.id          = 'status-badge-' + cycle.cycleId;
      badge.textContent = 'Pending';
      topbar.appendChild(badge);

      card.appendChild(topbar);

      // ── Meta row ─────────────────────────────────────────────
      var meta = document.createElement('div');
      meta.className = 'approval-card-meta';
      var parts = [];
      if (data.requestedAt) parts.push('Requested ' + _fmtTime(data.requestedAt));
      parts.push('Budget $' + budgetUsd.toFixed(0));
      if (withinItems.length > 0) parts.push(withinItems.length + ' within-budget');
      if (hasOverflow) parts.push(overflowItems.length + ' overflow');
      meta.textContent = parts.join(' \u00b7 ');
      card.appendChild(meta);

      // ── Agent summary ─────────────────────────────────────────
      if (data.agentSummary) {
        var desc = document.createElement('div');
        desc.className   = 'approval-desc';
        desc.textContent = data.agentSummary;
        card.appendChild(desc);
      }

      // ── Budget bar ────────────────────────────────────────────
      var pct = Math.min((withinCost / budgetUsd) * 100, 100);
      var bWrap = document.createElement('div');
      bWrap.className = 'approval-budget-wrap';

      var bLabels = document.createElement('div');
      bLabels.className = 'approval-budget-labels';

      var bLeft = document.createElement('span');
      bLeft.textContent = '$' + withinCost.toFixed(2) + ' within budget';
      var bRight = document.createElement('span');
      bRight.textContent = '$' + budgetUsd.toFixed(0) + ' limit';
      bLabels.appendChild(bLeft);
      bLabels.appendChild(bRight);

      var bTrack = document.createElement('div');
      bTrack.className = 'approval-budget-track';
      var bFill = document.createElement('div');
      bFill.className   = 'approval-budget-fill' + (withinCost > budgetUsd ? ' over' : '');
      bFill.style.width = pct + '%';
      bTrack.appendChild(bFill);

      bWrap.appendChild(bLabels);
      bWrap.appendChild(bTrack);
      card.appendChild(bWrap);

      // ── Within-budget items ───────────────────────────────────
      if (withinItems.length > 0) {
        var wLabel = document.createElement('div');
        wLabel.className   = 'approval-section-label';
        wLabel.textContent = '\u2713 Within Budget (' + withinItems.length + ')';
        card.appendChild(wLabel);
        var wList = document.createElement('div');
        wList.className = 'approval-item-list';
        withinItems.forEach(function(item) { wList.appendChild(_buildItemRow(item, 'within-budget')); });
        card.appendChild(wList);
      }

      // ── Overflow items ────────────────────────────────────────
      if (hasOverflow) {
        var oLabel = document.createElement('div');
        oLabel.className   = 'approval-section-label overflow-label';
        oLabel.textContent = '\u26a0 Overflow \u2014 Requires Approval (' + overflowItems.length + ')';
        card.appendChild(oLabel);
        var oList = document.createElement('div');
        oList.className = 'approval-item-list';
        overflowItems.forEach(function(item) { oList.appendChild(_buildItemRow(item, 'overflow')); });
        card.appendChild(oList);
      }

      // ── Action buttons ────────────────────────────────────────
      var actions = document.createElement('div');
      actions.className = 'approval-card-actions';
      actions.id        = 'actions-' + cycle.cycleId;

      var approveBtn = document.createElement('button');
      approveBtn.className   = 'btn-approve';
      approveBtn.textContent = '\u2713 Approve (' + withinItems.length + ' items)';

      var denyBtn = document.createElement('button');
      denyBtn.className   = 'btn-deny';
      denyBtn.textContent = '\u2715 Deny';

      // Wire both buttons in a single closure to avoid the second one overwriting
      // the first. approveBtn is primaryBtn (shows "…") on approve; denyBtn is
      // primaryBtn on deny — so the loading indicator always appears on the
      // button the operator actually clicked.
      (function(cid, cCard, aBtn, dBtn, cData, wi, oi) {
        aBtn.onclick = function() {
          _submitDecision(cid, { approveAll: true }, cCard, aBtn, dBtn, cData);
        };
        dBtn.onclick = function() {
          var allIds = wi.concat(oi).map(function(i) { return i.itemId; }).filter(Boolean);
          _submitDecision(cid, { rejectedItemIds: allIds }, cCard, dBtn, aBtn, cData);
        };
      })(cycle.cycleId, card, approveBtn, denyBtn, data, withinItems, overflowItems);

      actions.appendChild(denyBtn);

      if (typeof window.openApprovalModal === 'function') {
        var reviewBtn = document.createElement('button');
        reviewBtn.className   = 'btn-review';
        reviewBtn.textContent = '\u229e Review';
        (function(cid, sv, d) {
          reviewBtn.onclick = function() {
            window.openApprovalModal({
              cycleId:       cid,
              sprintVersion: sv,
              data:          d,
              onDecide:      function() { loadApprovalsPage(); },
            });
          };
        })(cycle.cycleId, cycle.sprintVersion, data);
        actions.appendChild(reviewBtn);
      }

      card.appendChild(actions);
      return card;
    }

    /** Build a compact decided / history card. */
    function _buildDecidedCard(cycle, kind) {
      var statusClass = kind === 'approved' ? 'status-approved'
                      : kind === 'denied'   ? 'status-denied'
                      : 'status-pending';

      var card = document.createElement('div');
      card.className = 'approval-card ' + statusClass;

      var row = document.createElement('div');
      row.className = 'approval-decided-row';

      var info = document.createElement('div');
      info.className = 'approval-decided-info';

      var nameDiv = document.createElement('div');
      nameDiv.className   = 'approval-decided-name';
      nameDiv.textContent = cycle.sprintVersion
        ? 'Sprint ' + cycle.sprintVersion + ' \u00b7 ' + cycle.cycleId
        : cycle.cycleId;
      info.appendChild(nameDiv);

      if (cycle.startedAt) {
        var tsDiv = document.createElement('div');
        tsDiv.className   = 'approval-decided-ts';
        tsDiv.textContent = 'Started ' + _fmtTime(cycle.startedAt);
        info.appendChild(tsDiv);
      }

      var badge = document.createElement('span');
      badge.className   = 'status-badge ' + statusClass;
      badge.textContent = kind === 'approved' ? 'Approved'
                         : kind === 'denied'  ? 'Denied'
                         : 'Decided';

      row.appendChild(info);
      row.appendChild(badge);
      card.appendChild(row);
      return card;
    }

    /** Build one item row inside the within-budget or overflow list. */
    function _buildItemRow(item, cls) {
      var row = document.createElement('div');
      row.className = 'approval-item-row ' + cls;

      var rank = document.createElement('span');
      rank.className   = 'approval-item-rank';
      rank.textContent = '#' + (item.rank || '?');

      var title = document.createElement('span');
      title.className   = 'approval-item-title';
      title.title       = item.rationale || '';
      title.textContent = item.title || item.itemId;

      var cost = document.createElement('span');
      cost.className   = 'approval-item-cost';
      cost.textContent = item.estimatedCostUsd != null
        ? '$' + Number(item.estimatedCostUsd).toFixed(2)
        : '\u2014';

      var who = document.createElement('span');
      who.className   = 'approval-item-who';
      who.textContent = item.suggestedAssignee || '';

      row.appendChild(rank);
      row.appendChild(title);
      row.appendChild(cost);
      row.appendChild(who);
      return row;
    }

    /**
     * POST decision to /api/v5/cycles/:id/approve.
     * Optimistically updates the card DOM; rolls back buttons on failure.
     */
    async function _submitDecision(cycleId, body, card, primaryBtn, secondaryBtn, _data) {
      if (primaryBtn)   { primaryBtn.disabled   = true; primaryBtn.textContent   = '\u2026'; }
      if (secondaryBtn) { secondaryBtn.disabled = true; }

      try {
        var res = await fetch(
          '/api/v5/cycles/' + encodeURIComponent(cycleId) + '/approve',
          {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(Object.assign({ decidedBy: 'dashboard' }, body)),
          }
        );

        if (res.ok) {
          var result = await res.json().catch(function() { return {}; });
          // POST /api/v5/cycles/:id/approve returns { ok: true, decision: { decision: 'approved'|'rejected', ... } }
          // Extract the decision string from the nested object.
          var decisionStr = (result.decision && result.decision.decision)
            ? result.decision.decision
            : (body.approveAll ? 'approved' : (body.rejectedItemIds ? 'rejected' : 'approved'));

          // Update the in-memory cycle row so filter tabs reflect the new decision
          // immediately (before the next loadApprovalsPage() refresh).
          _approvalAllCycles.forEach(function(c) {
            if (c.cycleId === cycleId) {
              c.hasApprovalPending  = false;
              c.hasApprovalDecision = true;
              c.approvalDecision    = decisionStr;
            }
          });

          // Update stats counters
          var pEl = document.getElementById('approvals-pending-count');
          if (pEl) {
            var pv = parseInt(pEl.textContent, 10);
            pEl.textContent = String(isNaN(pv) || pv < 1 ? 0 : pv - 1);
          }
          var isApproved = decisionStr === 'approved' || decisionStr === 'partially_approved';
          if (isApproved) {
            var aEl = document.getElementById('approvals-approved-count');
            if (aEl) { var av = parseInt(aEl.textContent, 10); aEl.textContent = String(isNaN(av) ? 1 : av + 1); }
          } else {
            var dEl = document.getElementById('approvals-denied-count');
            if (dEl) { var dv = parseInt(dEl.textContent, 10); dEl.textContent = String(isNaN(dv) ? 1 : dv + 1); }
          }

          // Swap card visual state
          var newStatus = isApproved ? 'status-approved' : 'status-denied';
          card.classList.remove('status-pending', 'status-approved', 'status-denied');
          card.classList.add(newStatus);

          var badgeEl = document.getElementById('status-badge-' + cycleId);
          if (badgeEl) {
            badgeEl.className   = 'status-badge ' + newStatus;
            badgeEl.textContent = isApproved ? 'Approved' : 'Denied';
          }

          var actionsEl = document.getElementById('actions-' + cycleId);
          if (actionsEl) {
            actionsEl.textContent = '';
            var doneBadge = document.createElement('span');
            doneBadge.className   = 'status-badge ' + newStatus;
            doneBadge.textContent = isApproved ? '\u2713 Decision recorded' : '\u2715 Rejected';
            actionsEl.appendChild(doneBadge);
          }

          // Remove from pending data cache
          _approvalPendingData = _approvalPendingData.filter(function(p) {
            return p.cycle.cycleId !== cycleId;
          });

          // Notify the global badge refresher
          if (typeof window._refreshApprovalsBadge === 'function') {
            window._refreshApprovalsBadge();
          }

        } else {
          var err = await res.json().catch(function() { return {}; });
          var msg = (err.error || 'HTTP ' + res.status);
          // 409 = already decided — silently reload
          if (res.status === 409) {
            setTimeout(function() { loadApprovalsPage(); }, 300);
          } else {
            alert('Decision failed: ' + msg);
            if (primaryBtn)   { primaryBtn.disabled   = false; primaryBtn.textContent   = '\u2713 Approve'; }
            if (secondaryBtn) { secondaryBtn.disabled = false; }
          }
        }
      } catch (e) {
        alert('Error submitting decision: ' + e.message);
        if (primaryBtn)   { primaryBtn.disabled   = false; primaryBtn.textContent = '\u2713 Approve'; }
        if (secondaryBtn) { secondaryBtn.disabled = false; }
      }
    }

    // ── Helper DOM builders ──────────────────────────────────────

    function _buildEmptyState(filter) {
      var wrap = document.createElement('div');
      wrap.className = 'empty-state';

      var icon = document.createElement('div');
      icon.className = 'empty-state-icon';
      icon.textContent = filter === 'pending' ? '\u2713' : '\u25cb';

      var title = document.createElement('div');
      title.className = 'empty-state-title';
      title.textContent = filter === 'pending'
        ? 'No pending approvals'
        : 'Nothing to show';

      var sub = document.createElement('div');
      sub.className = 'empty-state-sub';
      sub.textContent = filter === 'pending'
        ? 'The autonomous cycle is running within budget constraints.'
        : 'No items match the selected filter.';

      wrap.appendChild(icon);
      wrap.appendChild(title);
      wrap.appendChild(sub);
      return wrap;
    }

    function _buildErrorState(msg) {
      var wrap = document.createElement('div');
      wrap.className = 'empty-state';

      var icon = document.createElement('div');
      icon.className = 'empty-state-icon';
      icon.textContent = '\u26a0';

      var title = document.createElement('div');
      title.className = 'empty-state-title';
      title.textContent = 'Failed to load approvals';

      var sub = document.createElement('div');
      sub.className = 'empty-state-sub';
      sub.textContent = msg || 'Unknown error';

      wrap.appendChild(icon);
      wrap.appendChild(title);
      wrap.appendChild(sub);
      return wrap;
    }

    // ── Utilities ────────────────────────────────────────────────

    function _setStatPill(id, value) {
      var el = document.getElementById(id);
      if (el) el.textContent = String(value);
    }

    function _fmtTime(iso) {
      if (!iso) return '\u2014';
      var d = new Date(iso);
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    // ── Bootstrap ────────────────────────────────────────────────
    (function () {
      var sel = document.getElementById('approvals-filter-select');
      if (sel) sel.value = _approvalFilterState;

      if (typeof loadApprovalsPage === 'function') loadApprovalsPage();

      // Expose globally so SSE handler and approval-store can trigger reload
      window.loadApprovalsPage = loadApprovalsPage;

      // 30-second poll fallback.  Longer than the global 15s approval-store poll
      // so the two don't fire simultaneously.  Stops when DOM is navigated away.
      var _pollHandle = setInterval(function() {
        if (!document.getElementById('approval-list')) {
          clearInterval(_pollHandle);
          return;
        }
        loadApprovalsPage();
      }, 30000);
    })();
  </script>
