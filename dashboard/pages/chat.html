  <div class="page" id="page-chat" hidden>
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)">
      <div>
        <h1 style="font-size:var(--text-xl);font-weight:700;color:var(--text-primary);margin-bottom:4px">Chat</h1>
        <p style="font-size:var(--text-sm);color:var(--text-secondary)">Talk directly with any agent or open a multi-agent room</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:var(--text-sm);color:var(--text-secondary)">Multi-agent room</label>
        <label class="toggle-switch">
          <input type="checkbox" id="chat-room-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div style="display:flex;height:calc(100vh - 160px)">

      <!-- Sessions Sidebar -->
      <div style="width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-primary)">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">Sessions</div>
        <div id="chat-sessions-list" style="flex:1;overflow-y:auto;padding:8px 0">
          <div style="padding:8px 16px;font-size:var(--text-sm);color:var(--text-muted)">Loading...</div>
        </div>
        <div style="padding:12px">
          <button id="chat-new-session-btn" class="btn-primary" style="width:100%;font-size:var(--text-sm);padding:8px 0;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;cursor:pointer">+ New Session</button>
        </div>
      </div>

      <!-- Chat Main -->
      <div style="flex:1;display:flex;flex-direction:column;min-width:0">

        <!-- Agent selector row -->
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <!-- Single agent selector -->
          <div id="chat-single-agent-row" style="display:flex;gap:8px;align-items:center">
            <label style="font-size:var(--text-sm);color:var(--text-secondary);white-space:nowrap">Agent</label>
            <select id="chat-agent-select" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-sm);padding:6px 10px;font-size:var(--text-sm);min-width:180px">
              <option value="">Loading agents...</option>
            </select>
            <div id="chat-agent-avatar" style="display:none;width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0"></div>
          </div>

          <!-- Multi-agent room selector -->
          <div id="chat-room-agent-row" style="display:none;gap:8px;align-items:center;flex-wrap:wrap">
            <label style="font-size:var(--text-sm);color:var(--text-secondary);white-space:nowrap">Room agents</label>
            <div id="chat-room-agents-selected" style="display:flex;gap:6px;flex-wrap:wrap"></div>
            <select id="chat-room-agent-add" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-sm);padding:6px 10px;font-size:var(--text-sm);min-width:160px">
              <option value="">+ Add agent...</option>
            </select>
          </div>
        </div>

        <!-- Message history -->
        <div id="chat-messages" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;background:var(--bg-primary)">
          <div id="chat-empty-state" style="margin:auto;text-align:center;color:var(--text-muted)">
            <div style="font-size:40px;margin-bottom:8px">💬</div>
            <div style="font-size:var(--text-sm)">Select an agent and send a message to start chatting</div>
          </div>
        </div>

        <!-- Typing indicator -->
        <div id="chat-typing" style="display:none;padding:4px 24px 0;font-size:var(--text-xs);color:var(--text-muted);height:20px">
          <span id="chat-typing-text">Agent is typing...</span>
        </div>

        <!-- Input row -->
        <div style="padding:16px 24px;border-top:1px solid var(--border);background:var(--bg-card);display:flex;gap:10px;align-items:flex-end">
          <textarea id="chat-input" placeholder="Message the agent... (Shift+Enter for new line)" rows="2"
            style="flex:1;resize:none;background:var(--bg-primary);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-md);padding:10px 14px;font-family:var(--font-sans);font-size:var(--text-sm);line-height:1.5;outline:none;max-height:120px;overflow-y:auto"></textarea>
          <button id="chat-send-btn" style="background:var(--blue);color:#fff;border:none;border-radius:var(--radius-md);padding:10px 18px;font-size:var(--text-sm);font-weight:600;cursor:pointer;white-space:nowrap;height:42px">Send</button>
        </div>

      </div><!-- /chat main -->
    </div><!-- /flex row -->
  </div><!-- /page-chat -->
