  <div class="page" id="page-memory">
    <div class="page-header">
      <div>
        <h2>Memory Browser</h2>
        <p style="color:var(--text-secondary);font-size:13px;margin-top:4px;">
          Entries learned by agents across all sprint cycles.
        </p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="memory-count-badge" style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);"></span>
        <!-- Live feed badge — shown when SSE connection is active -->
        <span id="mem-live-badge" class="mem-live-badge" style="display:none;">
          <span class="mem-live-dot"></span>LIVE
        </span>
        <button class="export-btn" id="mem-clear-btn" onclick="_memClearFilters()" style="display:none;">&#x2715; Clear</button>
        <button class="export-btn" onclick="loadMemoryBrowser()">&#8635; Refresh</button>
      </div>
    </div>

    <!-- Search + agent filter row -->
    <div class="memory-search-bar">
      <input
        class="memory-search-input"
        type="search"
        id="memory-search"
        placeholder="Search memories — press Enter to search server-side…"
        oninput="_memOnSearchInput(this.value)"
        onkeydown="_memOnSearchKeydown(event)"
        autocomplete="off"
      />
      <select
        id="memory-agent-filter"
        onchange="memFilterAgent(this.value)"
        style="font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);outline:none;cursor:pointer;min-width:150px;transition:border-color 0.15s;"
      >
        <option value="all">All Agents</option>
      </select>
    </div>

    <!-- Time-range filter row -->
    <div class="memory-filter-row" id="memory-time-row" style="margin-bottom:2px;">
      <button class="mem-filter-btn mem-time-btn active" data-range="all"  onclick="_memSetTimeRange(this,'all')">All Time</button>
      <button class="mem-filter-btn mem-time-btn"        data-range="30d"  onclick="_memSetTimeRange(this,'30d')">Last 30 days</button>
      <button class="mem-filter-btn mem-time-btn"        data-range="7d"   onclick="_memSetTimeRange(this,'7d')">Last 7 days</button>
    </div>

    <!-- Category filter chips -->
    <div class="memory-filter-row">
      <button class="mem-filter-btn active" data-cat="all"      onclick="memFilterCat(this,'all')">All</button>
      <button class="mem-filter-btn"        data-cat="feedback"  onclick="memFilterCat(this,'feedback')">Feedback</button>
      <button class="mem-filter-btn"        data-cat="project"   onclick="memFilterCat(this,'project')">Project</button>
      <button class="mem-filter-btn"        data-cat="lesson"    onclick="memFilterCat(this,'lesson')">Lesson</button>
      <button class="mem-filter-btn"        data-cat="config"    onclick="memFilterCat(this,'config')">Config</button>
    </div>

    <!-- Type filter chips (dynamically populated from backend response) -->
    <div class="memory-filter-row" id="memory-type-row" style="margin-top:4px;"></div>

    <!-- Memory entry list -->
    <div class="memory-list" id="memory-list" style="max-height:none;"></div>

  </div><!-- /page-memory -->

<script>
(function () {
  // ── Reset filter state on fresh page load ──────────────────────────────
  // Prevents stale state from the home-page memory panel bleeding into this view.
  if (typeof memCatFilter    !== 'undefined') memCatFilter    = 'all';
  if (typeof memAgentFilter  !== 'undefined') memAgentFilter  = 'all';
  if (typeof memSearchFilter !== 'undefined') memSearchFilter = '';

  // ── Time-range filter state ──────────────────────────────────────────────
  // Drives ?since= query param passed to the API via window._memFetchExtra.
  window._memTimeRange  = 'all';
  window._memFetchExtra = '';       // starts empty → fetch all entries

  function _computeSinceParam(range) {
    if (range === '7d')  return '?since=' + encodeURIComponent(new Date(Date.now() - 7  * 24 * 3600 * 1000).toISOString());
    if (range === '30d') return '?since=' + encodeURIComponent(new Date(Date.now() - 30 * 24 * 3600 * 1000).toISOString());
    return '';
  }

  window._memSetTimeRange = function (btn, range) {
    window._memTimeRange = range;
    var btns = document.querySelectorAll('.mem-time-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i] === btn);
    }
    // Rebuild the fetch extra, preserving any pending server-side search.
    _memRebuildFetchExtra();
    if (typeof window.loadMemoryBrowser === 'function') window.loadMemoryBrowser();
  };

  // ── Server-side search state ─────────────────────────────────────────────
  // When the user presses Enter in the search box, the query is sent to the
  // server so it can be applied before the 200-entry cap.  Live client-side
  // filtering (oninput) continues to work on the already-loaded entries.
  var _pendingServerSearch = '';

  window._memOnSearchInput = function (val) {
    // Client-side filter runs immediately on every keystroke.
    if (typeof filterMemory === 'function') filterMemory(val);
    _updateClearBtn();
  };

  window._memOnSearchKeydown = function (e) {
    if (e.key === 'Enter') {
      var q = (e.target ? e.target.value : '').trim();
      if (q !== _pendingServerSearch) {
        _pendingServerSearch = q;
        _memRebuildFetchExtra();
        if (typeof window.loadMemoryBrowser === 'function') window.loadMemoryBrowser();
      }
    }
  };

  // Combine time-range, server-side search, and agent filter into a query string.
  // All three are sent to the server so the 200-entry cap is applied to the
  // already-filtered set — not to an unfiltered snapshot that may not contain
  // the agent the user selected.
  function _memRebuildFetchExtra() {
    var parts = [];
    var since = _computeSinceParam(window._memTimeRange);
    if (since) parts.push(since.slice(1)); // strip leading '?'
    if (_pendingServerSearch) parts.push('search=' + encodeURIComponent(_pendingServerSearch));
    // Include agent filter as a server-side param so time-range re-fetches
    // honour the selected agent without requiring an additional client filter pass.
    var currentAgent = (typeof memAgentFilter !== 'undefined') ? memAgentFilter : 'all';
    if (currentAgent && currentAgent !== 'all') {
      parts.push('agentId=' + encodeURIComponent(currentAgent));
    }
    window._memFetchExtra = parts.length ? ('?' + parts.join('&')) : '';
  }
  // Expose so index.html's memFilterAgent() can trigger a server-side param
  // rebuild immediately when the agent dropdown changes — without this, the
  // Refresh button would re-fetch without the selected agent filter until a
  // time-range button was also clicked.
  window._memRebuildFetchExtra = _memRebuildFetchExtra;

  // ── Clear all filters ────────────────────────────────────────────────────
  window._memClearFilters = function () {
    // Reset time range.
    window._memTimeRange = 'all';
    document.querySelectorAll('.mem-time-btn').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-range') === 'all');
    });

    // Reset category.
    if (typeof memCatFilter !== 'undefined') memCatFilter = 'all';
    document.querySelectorAll('.mem-filter-btn:not(.mem-type-btn):not(.mem-time-btn)').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-cat') === 'all');
    });

    // Reset type.
    window._memTypeFilter = 'all';
    document.querySelectorAll('.mem-type-btn').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-type') === 'all');
    });

    // Reset agent.
    if (typeof memAgentFilter !== 'undefined') memAgentFilter = 'all';
    var agentSel = document.getElementById('memory-agent-filter');
    if (agentSel) agentSel.value = 'all';

    // Reset search.
    var searchInput = document.getElementById('memory-search');
    if (searchInput) searchInput.value = '';
    if (typeof memSearchFilter !== 'undefined') memSearchFilter = '';
    _pendingServerSearch = '';

    // Rebuild fetch extra and reload.
    _memRebuildFetchExtra();
    _updateClearBtn();
    if (typeof window.loadMemoryBrowser === 'function') window.loadMemoryBrowser();
  };

  // Show/hide the Clear button whenever any filter is non-default.
  function _updateClearBtn() {
    var btn = document.getElementById('mem-clear-btn');
    if (!btn) return;
    var hasFilter = window._memTimeRange !== 'all'
      || (typeof memCatFilter   !== 'undefined' && memCatFilter   !== 'all')
      || (typeof memAgentFilter !== 'undefined' && memAgentFilter !== 'all')
      || (window._memTypeFilter && window._memTypeFilter !== 'all')
      || _pendingServerSearch !== ''
      || (typeof memSearchFilter !== 'undefined' && memSearchFilter !== '');
    btn.style.display = hasFilter ? '' : 'none';
  }

  // ── Type chip filter (populated dynamically from backend `types`) ────────
  window._memTypeFilter = 'all';

  window._memSetTypeFilter = function (btn, type) {
    window._memTypeFilter = type || 'all';
    var btns = document.querySelectorAll('.mem-type-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i] === btn);
    }
    if (typeof window.applyMemFilters === 'function') window.applyMemFilters();
    _updateClearBtn();
  };

  // ── Build type chip row from types returned by the API ───────────────────
  window._memBuildTypeChips = function (types) {
    var row = document.getElementById('memory-type-row');
    if (!row) return;
    while (row.firstChild) row.removeChild(row.firstChild);
    // Reset type filter state so it stays consistent with the rebuilt chip UI.
    // Without this reset, a previously-selected type filter would remain active
    // (hiding entries) while the "All Types" button visually appears selected.
    window._memTypeFilter = 'all';
    if (!types || types.length === 0) return;

    var allBtn = document.createElement('button');
    allBtn.className = 'mem-filter-btn mem-type-btn active';
    allBtn.setAttribute('data-type', 'all');
    allBtn.textContent = 'All Types';
    allBtn.onclick = function () { window._memSetTypeFilter(allBtn, 'all'); };
    row.appendChild(allBtn);

    types.forEach(function (type) {
      var btn = document.createElement('button');
      btn.className = 'mem-filter-btn mem-type-btn';
      btn.setAttribute('data-type', type);
      btn.textContent = type.replace(/-/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      btn.onclick = (function (t, b) {
        return function () { window._memSetTypeFilter(b, t); };
      }(type, btn));
      row.appendChild(btn);
    });
  };

  // ── Count badge ──────────────────────────────────────────────────────────
  window._memUpdateCountBadge = function () {
    var badge = document.getElementById('memory-count-badge');
    if (!badge) return;
    var entries = document.querySelectorAll('.memory-entry');
    var total   = entries.length;
    var visible = 0;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].style.display !== 'none') visible++;
    }
    badge.textContent = visible === total
      ? total + ' entries'
      : visible + ' / ' + total + ' entries';
  };

  // ── Wrap applyMemFilters: layer type filter on top, refresh badge ────────
  var _origApplyMemFilters = typeof applyMemFilters === 'function' ? applyMemFilters : null;
  window.applyMemFilters = function () {
    if (_origApplyMemFilters) _origApplyMemFilters();

    var activeType = window._memTypeFilter || 'all';
    if (activeType !== 'all') {
      var entries = document.querySelectorAll('.memory-entry');
      for (var i = 0; i < entries.length; i++) {
        var entryType = entries[i].getAttribute('data-type') || '';
        if (entryType !== activeType) entries[i].style.display = 'none';
      }
    }

    window._memUpdateCountBadge();
    _updateClearBtn();
  };

  // ── Patch loadMemoryBrowser to capture types and wire chips ─────────────
  // loadMemoryBrowser() in index.html also calls _memBuildTypeChips() directly
  // after data loads, so this fetch-intercept is a belt-and-suspenders fallback.
  if (typeof loadMemoryBrowser === 'function') {
    var _origLoadMemoryBrowser = loadMemoryBrowser;
    window.loadMemoryBrowser = function () {
      var capturedTypes = [];
      var _origFetch = window.fetch;

      window.fetch = function (url, opts) {
        var result = _origFetch.apply(this, arguments);
        if (typeof url === 'string' && url.indexOf('/api/v5/memory') !== -1) {
          result.then(function (r) {
            var clone = r.clone();
            clone.json().then(function (json) {
              if (json && Array.isArray(json.types)) capturedTypes = json.types;
            }).catch(function () {});
          }).catch(function () {});
        }
        return result;
      };

      return Promise.resolve(_origLoadMemoryBrowser()).then(function () {
        window.fetch = _origFetch;
        window._memBuildTypeChips(capturedTypes);
        window._memUpdateCountBadge();
        _updateClearBtn();
      }).catch(function (err) {
        window.fetch = _origFetch;
        return Promise.reject(err);
      });
    };

    loadMemoryBrowser();
  }

  // ── SSE Live-Feed Integration ────────────────────────────────────────────
  (function _initMemoryLiveFeed() {
    var _liveBadge    = document.getElementById('mem-live-badge');
    var _refreshTimer = null;
    var _PAGE_ROUTE   = '/memory';

    function _isMemoryPageActive() {
      return typeof location !== 'undefined' && location.pathname === _PAGE_ROUTE;
    }

    function _syncLiveBadge() {
      if (!_liveBadge) return;
      var sseConnected = window.SSE && window.SSE.source &&
                         window.SSE.source.readyState === 1 /* EventSource.OPEN */;
      _liveBadge.style.display = sseConnected ? '' : 'none';
    }

    function _scheduleRefresh() {
      if (!_isMemoryPageActive()) return;
      clearTimeout(_refreshTimer);
      _refreshTimer = setTimeout(function () {
        if (!_isMemoryPageActive()) return;
        if (typeof window.loadMemoryBrowser === 'function') window.loadMemoryBrowser();
      }, 1200);
    }

    function _attachSSEListeners() {
      if (!window.SSE || !window.SSE.source) return;
      var triggers = ['cycle_event', 'session-completed', 'session-started'];
      triggers.forEach(function (evtName) {
        window.SSE.source.addEventListener(evtName, function () { _scheduleRefresh(); });
      });
      window.SSE.source.onopen  = (function (orig) {
        return function (e) { _syncLiveBadge(); if (orig) orig.call(this, e); };
      }(window.SSE.source.onopen));
      window.SSE.source.onerror = (function (orig) {
        return function (e) { _syncLiveBadge(); if (orig) orig.call(this, e); };
      }(window.SSE.source.onerror));
      _syncLiveBadge();
    }

    var _sseWaitAttempts = 0;
    function _waitForSSE() {
      if (window.SSE && window.SSE.source) { _attachSSEListeners(); return; }
      if (_sseWaitAttempts++ < 20) setTimeout(_waitForSSE, 300);
    }
    _waitForSSE();

    window.addEventListener('popstate', function () {
      if (!_isMemoryPageActive()) {
        clearTimeout(_refreshTimer);
        if (_liveBadge) _liveBadge.style.display = 'none';
      }
    });
  })();
})();
</script>
