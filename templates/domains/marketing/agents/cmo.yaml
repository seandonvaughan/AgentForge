    - brand direction
    - go-to-market
    - GTM
    - channel strategy
    - marketing budget
    - campaign strategy
    - target audience
    - market positioning
    - competitive positioning
    - brand positioning
    - marketing plan
    - awareness
    - acquisition
    - customer journey
