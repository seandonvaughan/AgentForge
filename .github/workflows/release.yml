# Release Pipeline for AgentForge
# Triggers on version tag pushes (e.g., v0.4.0)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm exec vitest run

      - name: Type check
        run: pnpm exec tsc --noEmit

  convergence-gate:
    name: Convergence Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Fail if root src/server/ still exists
        run: |
          if [ -d "src/server" ]; then
            echo "FAILED: root src/server/ must be removed before release."
            echo "All server code must live in packages/server -- delete or move src/server/ and merge those changes first."
            exit 1
          fi
          echo "OK: src/server/ not present"

      - name: Fail if root src/cli/compat/ still exists
        run: |
          if [ -d "src/cli/compat" ]; then
            echo "FAILED: root src/cli/compat/ must be removed before release."
            echo "Compat shims must live in packages/cli -- delete or move src/cli/compat/ and merge those changes first."
            exit 1
          fi
          echo "OK: src/cli/compat/ not present"

  build-and-release:
    name: Build & Release
    needs: [test, convergence-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          echo "" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          body_path: changelog.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
