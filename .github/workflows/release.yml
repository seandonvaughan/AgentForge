# Release Pipeline for AgentForge
# Triggers on version tag pushes (e.g., v0.4.0)
# Node version is read from .nvmrc — update that file to change the version everywhere.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Convergence gate — no deprecated root src/ directories
        run: |
          FAILED=0
          for dir in src/server src/builder src/autonomous; do
            if [ -d "$dir" ]; then
              echo "::error file=$dir::Convergence violation: deprecated directory '$dir' must not exist at tag time. Remove it before releasing."
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Release blocked. Deprecated root src/ directories were found."
            echo "These surfaces were removed as part of the convergence work (v10.x)."
            echo "Re-introducing them breaks the convergence contract. Remove them and re-tag."
            exit 1
          fi
          echo "Convergence gate passed: src/server, src/builder, src/autonomous are absent."

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gates
        run: pnpm verify:gates

      - name: Run tests
        run: pnpm exec vitest run

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run dashboard Playwright gates
        run: pnpm test:e2e:dashboard

  build-and-release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          echo "" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: changelog.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
