# CI Pipeline for AgentForge
# Status badge: ![CI](https://github.com/<owner>/AgentForge/actions/workflows/ci.yml/badge.svg)
# Node version is read from .nvmrc — update that file to change the version everywhere.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Convergence gate — no deprecated root src/ directories
        run: |
          FAILED=0
          for dir in src/server src/builder src/autonomous; do
            if [ -d "$dir" ]; then
              echo "::error file=$dir::Convergence violation: deprecated directory '$dir' must not exist. Remove it before merging."
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "PR blocked. Deprecated root src/ directories were found."
            echo "These surfaces were removed as part of the convergence work (v10.x)."
            echo "Re-introducing them breaks the convergence contract. Remove them and re-push."
            exit 1
          fi
          echo "Convergence gate passed: src/server, src/builder, src/autonomous are absent."

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gates
        run: pnpm verify:gates

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Verify agent-driven forge e2e ran
        if: always()
        run: node scripts/ci-verify-forge-e2e-ran.mjs test-results/junit.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  dashboard:
    name: Dashboard Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check dashboard
        run: pnpm dashboard:check

      - name: Build dashboard
        run: pnpm dashboard:build

  product-e2e:
    name: Product E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run dashboard Playwright gates
        run: pnpm test:e2e:dashboard

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Type check
        run: pnpm exec tsc -b --noEmit

  forge-pipeline-stats:
    name: Forge Pipeline Stats
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download test results
        uses: actions/download-artifact@v4.3.0
        with:
          name: test-results
          path: test-results/
        continue-on-error: true

      - name: Post forge e2e summary to GitHub Actions summary
        run: |
          JUNIT="test-results/junit.xml"
          SUMMARY_LINE=""

          if [ ! -f "$JUNIT" ]; then
            SUMMARY_LINE="Agent-driven forge pipeline e2e: SKIPPED (no JUnit artifact)"
          elif ! grep -q "agent-driven-forge-e2e" "$JUNIT"; then
            SUMMARY_LINE="Agent-driven forge pipeline e2e: NOT RUN (suite absent from JUnit output)"
          else
            # Extract elapsed time from the matching testsuite element.
            # Vitest JUnit emits: <testsuite time="1.234" ...>
            # We grep for the block that contains our file token, then pull the time attr.
            ELAPSED=$(grep -A1 "agent-driven-forge-e2e" "$JUNIT" | grep -oP 'time="\K[^"]+' | head -1)
            if [ -n "$ELAPSED" ]; then
              SUMMARY_LINE="Agent-driven forge pipeline e2e: PASS in ${ELAPSED}s"
            else
              SUMMARY_LINE="Agent-driven forge pipeline e2e: PASS"
            fi
          fi

          echo "### Forge Pipeline E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✓ ${SUMMARY_LINE}" >> "$GITHUB_STEP_SUMMARY"
