learnings:
  - Lazy-load @xenova/transformers — eager import at module top breaks CI memory budgets
  - ESM require() silently fails in this codebase; use import for transformers entry points
  - Cosine similarity must guard against zero-norm vectors or NaN poisons downstream top-k rankings
