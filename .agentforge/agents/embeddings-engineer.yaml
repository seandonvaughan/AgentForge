learnings:
  - Lazy-load the transformer model — eager import at module top breaks CI memory budgets and adds a ~50 MB download.
  - ESM require() silently fails in this codebase; use import for the transformers entry point.
  - Cosine similarity must guard against zero-norm vectors or NaN poisons downstream top-k rankings.
  - >-
    EMBEDDING_DIMS (384) is a storage contract — never mix dimensionalities in one store; a model swap means a full
    re-encode.
  - Namespace shared-store entries (KG_ENTITY_PREFIX pattern) so entity and memory vectors never collide.
