learnings:
  - Atoms are pure presentational — never add fetch() or workspace imports to a v2 component.
  - Gradient <linearGradient id=...> needs a unique per-instance suffix or SVG defs collide across pages.
  - Honour prefers-reduced-motion in every spring/tween — short-circuit the animation path.
  - $state<T>() without an initializer silently widens to never — always pass an initial value.
  - Use Snippet + {@render} for children in Svelte 5 — default slots are the legacy API and mixing them breaks typing.
