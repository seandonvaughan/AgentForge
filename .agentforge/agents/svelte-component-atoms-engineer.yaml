  auto_include:
    - packages/dashboard/src/lib/components/v2
    - packages/dashboard/src/routes/cycles/[id]/+page.svelte
    - packages/dashboard/src/routes/agents/[id]/+page.svelte
    - packages/dashboard/src/routes/runner/+page.svelte
  project_specific:
    - packages/dashboard/src/lib/components
learnings:
  - Atoms are pure presentational â€” never add fetch() or workspace imports
  - Gradient <linearGradient id=...> needs a unique per-instance suffix or SVG defs collide across pages
  - Honour prefers-reduced-motion in every spring/tween â€” short-circuit the animation path
