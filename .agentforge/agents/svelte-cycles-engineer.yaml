learnings:
  - >-
    Never name a Svelte test file with +page.test.ts — SvelteKit reserves +-prefixed filenames and svelte-kit sync
    crashes in <30s, breaking all CI
  - '{@const} must be a direct child of {#if}/{#each}; {#each x as const} is invalid in Svelte 5 — use object arrays'
  - >-
    All document.* / EventSource access in SvelteKit routes must be guarded with `browser` from $app/environment or SSR
    throws
