    - packages/core/src/team/engine/genesis
learnings:
  - >-
    ESM require() fails silently in core/team/engine ‚Äî buildKeySubsystems was broken in v10.7 until rewritten as
    top-level import
  - Forge only rewrites template-derived agents; custom agents need explicit reforge to inherit new memory or routing
  - Memory-aware forge writes 8 lessons per agent (capped) ‚Äî never bypass; over-cap prompts blow the context budget
