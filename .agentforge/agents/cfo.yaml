  - *MAJOR — Naive `split(' ')` in `defaultTypeCheck` will corrupt complex commands**

  - Gate rejected: Both MAJOR findings verified as still present in the current working tree. (1) capModelTier() and the
  modelCap path in RuntimeAdapter have zero test coverage — grep across all *.test.t…

  - **[MAJOR] `effort` typed as `string` in two places** — `AgentRuntimeConfig.effort` and `ExecutionRequest.effort` are
  both `string`. The flag is passed straight to the Claude subprocess as `--effort <…

  - **[MAJOR] No tests for `capModelTier()` or `RuntimeAdapter` with `modelCap`** — `grep` across all `*.test.ts` files
  returns nothing for `modelCap`, `capModelTier`, or `AUTONOMOUS_MODEL_CAP`. This is …

  - Gate rejected: Strong execution on scope (17/18 items delivered, solid test coverage, good security posture), but
