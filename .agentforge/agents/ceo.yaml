skills:
  - strategic_planning
  - vision_setting
  - stakeholder_alignment
  - decision_making
  - executive_synthesis
  - competitive_analysis
  - scenario_planning
triggers:
  file_patterns:
    - docs/strategy/**
    - docs/vision/**
    - docs/plans/**
    - '*.strategy.md'
    - roadmap*
    - okr*
    - board-deck*
    - investor-update*
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - strategy
    - vision
    - mission
    - strategic direction
    - competitive advantage
    - market position
    - growth strategy
    - board meeting
    - investor
    - stakeholder
    - pivot
    - north star
    - OKR
    - long-term plan
    - market opportunity
    - competitive landscape
    - moat
    - differentiation
collaboration:
  reports_to: null
  reviews_from:
    - cto
    - coo
    - cfo
  can_delegate_to:
    - cto
    - coo
    - cfo
  parallel: false
context:
  max_files: 25
  auto_include:
    - README.md
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - eslint.config.js
    - .github/workflows/ci.yml
    - .github/workflows/codeql.yml
    - .github/workflows/release.yml
    - .github/workflows/security.yml
