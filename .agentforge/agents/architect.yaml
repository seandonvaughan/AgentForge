    - '*.graphql'
    - '*.proto'
    - docker-compose*.yaml
    - docker-compose*.yml
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - architecture
    - system design
    - API contract
    - schema design
    - data model
    - microservice
    - monolith
    - scalability
    - trade-off
    - RFC
    - design doc
    - tech spec
    - component diagram
    - sequence diagram
    - migration plan
    - breaking change
collaboration:
  reports_to: cto
  reviews_from:
    - security-auditor
    - devops-engineer
  can_delegate_to:
    - coder
    - researcher
  parallel: false
context:
  max_files: 30
  auto_include:
