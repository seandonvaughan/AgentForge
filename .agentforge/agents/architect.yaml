    - package.json
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - eslint.config.js
    - .github/workflows/ci.yml
    - .github/workflows/codeql.yml
    - .github/workflows/release.yml
    - .github/workflows/security.yml
