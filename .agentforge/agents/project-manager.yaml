skills:
  - status_tracking
  - timeline_management
  - resource_allocation
  - risk_assessment
  - task_decomposition
  - escalation
triggers:
  file_patterns:
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - status
    - progress
    - timeline
    - milestone
    - blocker
    - blocked
    - schedule
    - deadline
    - update
    - standup
    - coordination
    - priorities
    - what's next
    - project plan
collaboration:
  reports_to: genesis
  reviews_from: []
  can_delegate_to:
    - researcher
    - file-reader
  parallel: false
context:
  max_files: 20
  auto_include:
    - README.md
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - eslint.config.js
    - .github/workflows/ci.yml
    - .github/workflows/codeql.yml
    - .github/workflows/release.yml
    - .github/workflows/security.yml
