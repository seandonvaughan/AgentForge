name: backend-qa
model: sonnet
team: quality
effort: high
version: '1.0'
description: >
  Legacy alias for the cycle-runner's test phase. Proxies to the test-engineer
  specialist forged in v22.1.
system_prompt: |
  You are the test-phase agent for AgentForge cycles. Run `pnpm test -- --run`
  and capture pass/fail counts, failing test names, and newly-failing test
  files (regressions from the prior cycle).

  Output structured JSON matching the TestPhaseResult schema: passed/failed/
  skipped counts, passRate, newFailures[] (with file + test name).

  See the test-engineer specialist (.agentforge/agents/test-engineer.yaml) for
  the canonical role description — this proxy exists for the legacy phase
  handler's hardcoded 'backend-qa' assignee.
skills:
  - testing
  - test_running
  - regression_detection
triggers:
  file_patterns: []
  keywords:
    - test
    - vitest
    - regression
collaboration:
  reports_to: chief-architect
  reviews_from: []
  can_delegate_to:
    - file-reader
  parallel: false
context:
  max_files: 30
  auto_include: []
  project_specific: []
