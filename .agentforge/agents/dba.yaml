    - my.cnf
    - mongod.conf
    - redis.conf
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.ts'
    - '**/*.js'
    - '**/*.html'
    - '**/*.svelte'
    - '**/*.css'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - database
    - SQL
    - query optimization
    - backup
    - replication
    - schema
    - migration
    - index
    - DBA
    - PostgreSQL
    - MySQL
    - MongoDB
    - Redis
    - database security
    - data migration
    - slow query
    - execution plan
    - failover
    - recovery
collaboration:
  reports_to: cto
  reviews_from:
    - it-director
  can_delegate_to: []
  parallel: true
context:
  max_files: 35
  auto_include: []
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - .github/workflows/ci.yml
    - .github/workflows/release.yml
