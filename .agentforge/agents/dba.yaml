    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - database
    - SQL
    - query optimization
    - backup
    - replication
    - schema
    - migration
    - index
    - DBA
    - PostgreSQL
    - MySQL
    - MongoDB
    - Redis
    - database security
    - data migration
    - slow query
    - execution plan
    - failover
    - recovery
