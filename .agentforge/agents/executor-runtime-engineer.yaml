context:
  max_files: 30
  auto_include:
    - packages/executor/src/index.ts
    - packages/core/src/index.ts
    - packages/server/src/routes/v5/index.ts
    - packages/executor/package.json
  project_specific:
    - packages/executor/src
    - packages/core/src
learnings:
  - >-
    Parallel cycle execution must allocate worktrees from an item-specific session key; agent-only/cycle-only keys collide
    when one agent receives multiple items.
  - >-
    Codex CLI exit errors need durable raw stdout/stderr artifacts because truncated transport errors can hide the real
    failing command.
  - Effort-level tests should use allowed values ('low', 'medium', 'high', 'max') or a shared EffortLevel type.
  - >-
    RuntimeAdapter model-cap changes need pure capModelTier coverage plus integration proof that the selected model and
    effort are both substituted.
  - >-
    TypeScript LSP/HMR deletes newly created .ts files during parallel sessions — write + git add in a single atomic
    bash call
  - >-
    v6.4 autonomous loop concentrated spend in synthesis phases — bus producers must respect per-phase caps before
    dispatch
  - Bus topic names are versioned — never reuse agent.dm.sent or inbox.message.created with a different payload shape
  - Rebase staged promotion onto the current active override or reject promotion when the staged base is stale.
  - test coverage does not exercise the real orchestrator path or stale-canary promotion
  - staticFallback() silently mishandles P3 priority
  - >-
    Code reviewers sometimes analyze an intermediate execute-phase snapshot — by the time the gate runs, a flagged bug
    may already be patched.
  - stringify must never be used as fallback.
owns_subsystems:
  - packages/executor/src
  - packages/core/src
capability_tags:
  - planner
  - executor
  - runtime-supervisor
  - message-bus-v2
  - sse-bridge
team: implementation
effort: high
