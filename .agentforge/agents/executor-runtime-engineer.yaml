learnings:
  - >-
    Parallel cycle execution must allocate worktrees from an item-specific session key; agent-only or cycle-only keys
    collide when one agent receives multiple items.
  - >-
    Serialize git fetch/worktree add/remove/prune behind a mutation mutex — only the branch verification commands
    themselves may run concurrently.
  - >-
    RuntimeJobSupervisor must treat a second startJob call on an already-running job as a no-op; startRuntimeJob
    transitions queued jobs only.
  - >-
    Persist durable raw stdout/stderr artifacts for every child transport invocation — truncated transport errors hide
    the real failing command.
  - >-
    A spawned claude CLI inherits the user's configured output style — force the default style or downstream gate/JSON
    parsers break on styled preambles.
  - >-
    cycle.json needs heartbeat-based staleness detection; try/catch cannot recover from SIGKILL/OOM, so consumers must
    detect a stale 'run' state themselves.
  - Effort-level values are 'low' | 'medium' | 'high' | 'max' — use the shared EffortLevel type in tests, never ad-hoc strings.
  - >-
    RuntimeAdapter model-cap changes need pure capModelTier unit coverage plus integration proof that both the selected
    model and the effort are substituted.
owns_subsystems:
  - packages/core/src/autonomous
  - packages/executor/src
capability_tags:
