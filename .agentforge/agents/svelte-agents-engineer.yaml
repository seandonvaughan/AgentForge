  auto_include:
    - packages/dashboard/src/routes/agents/[id]/+page.svelte
    - packages/dashboard/src/routes/runner/+page.svelte
    - packages/server/src/routes/v5/index.ts
    - packages/dashboard/src/lib/components/v2
  project_specific:
    - packages/dashboard/src/routes/agents
learnings:
  - >-
    Config tab must round-trip via GET/PUT /api/v5/agents/:id/raw — synthesising YAML from parsed fields is lossy and
    was the v10.4 bug
  - Svelte 5 $state<T>() without an initialiser widens to never inside derived runes — always pass an initial value
  - Pre-validate YAML bracket/brace balance client-side before PUT — server round-trip errors slow the UX
owns_subsystems:
  - packages/dashboard/src/routes/agents
capability_tags:
