    Every scanner phase must be wrapped in Promise.allSettled with a DEFAULT_* fallback — one rejection cannot poison
    the combined scan result.
  - 'Git analyzer must tolerate shallow clones (CI fetch-depth: 1) — empty git log is normal, not an error.'
  - Comment-miner regex must use bounded quantifiers ({0,N}) — unbounded .* gets flagged as ReDoS by CodeQL.
  - The scan shape is a disk contract (.agentforge/analysis/project-scan.json) — add fields, never rename or remove.
