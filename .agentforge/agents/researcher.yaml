skills:
  - web_search
  - documentation_lookup
  - api_reference
  - library_comparison
  - cve_lookup
triggers:
  file_patterns:
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - research
    - look up
    - find documentation
    - API reference
    - how does
    - what is
    - compare
    - library
    - package
    - version
    - changelog
    - CVE
    - advisory
    - best practice
    - RFC
    - specification
    - migration guide
    - deprecation
collaboration:
  reports_to: cto
  reviews_from: []
  can_delegate_to: []
  parallel: true
context:
  max_files: 5
  auto_include: []
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - eslint.config.js
    - .github/workflows/ci.yml
    - .github/workflows/codeql.yml
    - .github/workflows/release.yml
    - .github/workflows/security.yml
