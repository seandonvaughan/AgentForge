skills:
  - agent_design
  - template_generation
  - gap_analysis
  - capability_mapping
  - prompt_engineering
triggers:
  file_patterns:
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - custom agent
    - new agent
    - missing capability
    - agent template
    - generate agent
    - create agent
    - extend team
    - specialized agent
    - domain-specific agent
collaboration:
  reports_to: genesis
  reviews_from:
    - genesis
  can_delegate_to:
    - researcher
    - file-reader
  parallel: false
context:
  max_files: 30
  auto_include:
    - templates/
  project_specific:
    - README.md
    - CHANGELOG.md
    - package.json
    - tsconfig.json
    - eslint.config.js
    - .github/workflows/ci.yml
    - .github/workflows/codeql.yml
    - .github/workflows/release.yml
    - .github/workflows/security.yml
