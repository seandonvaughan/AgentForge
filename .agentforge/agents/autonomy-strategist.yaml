    - cycle-orchestration
    - budget-governance
    - gate-design
    - self-correction
collaboration:
  reports_to: null
  reviews_from: []
  can_delegate_to: []
  parallel: true
context:
  max_files: 30
  auto_include:
    - packages/executor/src/index.ts
    - packages/core/src/index.ts
    - packages/server/src/routes/v5/index.ts
    - packages/dashboard/src/routes/cycles/[id]/+page.svelte
  project_specific:
    - packages/executor/src
    - packages/core/src
learnings:
  - >-
    Per-phase cost caps must wrap every Agent dispatch — v6.4's single $50 cap let synthesis phases consume the entire
    budget
  - >-
    gate.verdict.created and review.finding.created producers were deferred in Phase 2 agent-comm — InboxBridge
    subscribes but nothing publishes yet
  - Always fail-closed on budget enforcement; never silently downgrade a gate verdict to keep a cycle running
owns_subsystems:
  - packages/executor/src
  - packages/core/src
capability_tags:
  - autonomous-loop
  - cycle-orchestration
  - budget-governance
  - gate-design
  - self-correction
team: strategic
effort: xhigh
