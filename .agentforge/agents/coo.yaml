skills:
  - operational_planning
  - process_optimization
  - resource_allocation
  - milestone_tracking
  - bottleneck_analysis
  - kpi_definition
  - project_management
triggers:
  file_patterns:
    - docs/operations/**
    - docs/processes/**
    - operational-plan*
    - process-map*
    - resource-plan*
    - project-plan*
    - status-report*
    - milestone*
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.js'
    - '**/*.html'
    - '**/*.ts'
    - '**/*.css'
    - '**/*.svelte'
    - '**/*.sh'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
  keywords:
    - operations
    - process optimization
    - resource allocation
    - milestone
    - project plan
    - execution
    - bottleneck
    - workflow
    - timeline
    - capacity planning
    - KPI
    - operational efficiency
    - project management
    - status report
    - delivery schedule
collaboration:
  reports_to: ceo
  reviews_from:
    - ceo
  can_delegate_to:
    - business-analyst
    - operations-manager
  parallel: true
context:
  max_files: 30
  auto_include: []
  project_specific:
