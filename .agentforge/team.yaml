collaboration:
  name: v3-development
  type: matrix
  topology:
    root: cto
    levels:
      - [cto, vp-engineering, vp-product, lead-architect]
      - [core-platform-lead, runtime-platform-lead, experience-design-lead, cost-optimization-lead, agent-intelligence-lead, integration-architecture-lead, quality-assurance-lead, build-release-lead, feedback-analyst]
      - [type-system-designer, scanner-pipeline-designer, cost-engine-designer]
      - [type-implementer, type-migrator, file-git-scanner-dev, dependency-ci-scanner-dev, doc-integration-scanner-dev, team-composer-dev, domain-pack-dev, agent-template-author, delegation-execution-dev, progress-loop-guard-dev, event-handoff-context-dev, cost-tracker-dev, cost-projector-dev, feedback-pipeline-dev, agent-api-dev, genesis-pipeline-dev, workflow-replication-dev, command-interface-dev, technical-writer, system-prompt-crafter, model-routing-researcher, parallel-execution-researcher, budget-strategy-researcher, feedback-analysis-researcher, multi-agent-framework-researcher, self-improvement-researcher, external-tools-researcher, agent-protocol-researcher, type-scanner-tester, builder-domain-tester, orchestrator-tester, end-to-end-tester, security-vulnerability-tester, test-executor, build-pipeline-runner, release-packager, type-propagation-checker, coverage-gap-checker, docs-sync-checker]
  delegation_rules:
    direction: top-down
    cross_level: true
    peer_collaboration: true
    review_flow: bottom-up
  communication:
    patterns:
      - fan-out
      - pipeline
      - review-loop
      - feedback-loop
    gates:
      - name: review-before-complete
        type: hard-gate
      - name: verify-before-claim
        type: hard-gate
      - name: cost-check-before-opus
        type: soft-gate
  escalation:
    max_retries: 3
    escalate_to: root
    human_escalation: true
  loop_limits:
    review_cycle: 3
    delegation_depth: 5
    retry_same_agent: 2
    total_actions: 100

project_brief:
  project:
    name: AgentForge
    type: software
    stage: growth
  goals:
    - "Build cost-aware agent architecture with budget enforcement and projection"
    - "Create R&D teams for cost optimization, agent intelligence, and integration"
    - "Close the feedback loop — agents submit feedback that drives reforge decisions"
    - "Organize teams by function, not job title — Core Platform, Runtime, Experience"
    - "Enable workflow replication — generate teams from workflow descriptions"
    - "Implement rich agent communication — structured handoffs, knowledge bases, decision logs"
  domains:
    - core
    - software
    - research
  constraints:
    opus_budget: "<15% of total token spend"
    haiku_target: ">55% of total token spend"
    model_justification: "Every agent must have a documented reason for its model tier"

# Cost Profile (with executive assistants)
# Opus:   4 agents  (6%)  — ~5-7% estimated token spend (assistants reduce invocations 80%+)
# Sonnet: 13 agents (20%) — ~28% estimated token spend
# Haiku:  46 agents (72%) — ~65% estimated token spend
# Total: 63 agents (v3.1 reforge: +benchmark-lead/Sonnet, +budget-runtime-dev/Haiku, +routing-dev/Haiku, +integration-runtime-dev/Haiku)
#
# Effort Levels:
# max:    2 agents (cto, lead-architect) — deepest reasoning
# high:  15 agents (VPs, team leads, analysts, benchmark-lead) — complex bounded work
# medium: 7 agents (migration, security, e2e, prompts, integration-runtime-dev) — judgment-required implementation
# low:   39 agents (coders, testers, researchers, assistants) — mechanical/parallel work
