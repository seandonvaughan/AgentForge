runtime: auto       # Execution transport mode: auto | sdk | cli | codex-cli | openai-sdk
# auto registers the full transport fleet so per-item providerPreference failover
# is live: bulk items stay codex-first (abundant tokens), security/high-complexity
# items escalate to Claude, and a classified-retriable error auto-switches to the
# next eligible provider. Non-routed phase calls default to codex-first in the
# runtime-adapter, preserving the abundant-Codex strategy.
effortCap: high     # High-throughput Codex preset while the Codex line is being hardened.
#   auto: registers all transports; preserves existing Anthropic/Claude preference.
#   sdk:  compatibility alias for anthropic-sdk.
#   cli:  compatibility alias for Claude Code CLI subprocess.
#   codex-cli: Codex CLI subprocess using the logged-in Codex account.
#   openai-sdk: OpenAI Responses API fallback using OPENAI_API_KEY.
#   Env var AGENTFORGE_RUNTIME overrides this field when both are set.
#   See docs/runtime-modes.md for full details.
budget:
  perCycleUsd: 200
  perItemUsd: 40
  perAgentUsd: 60
  allowOverageApproval: true
limits:
  maxItemsPerSprint: 1
  maxDurationMinutes: 180
  maxConsecutiveFailures: 5
  maxExecutePhaseFailureRate: 0.5
  maxExecutePhaseParallelism: 10
quality:
  testPassRateFloor: 0.95
  allowRegression: false
  requireBuildSuccess: true
  requireTypeCheckSuccess: true
git:
  branchPrefix: codex/
  baseBranch: main
  refuseCommitToBaseBranch: true
  includeDiagnosticBranchOnFailure: true
  maxFilesPerCommit: 100
pr:
  draft: false
  assignReviewer: seandonvaughan
  labelPrefix: autonomous
  labels:
    - autonomous
    - needs-review
  titleTemplate: 'autonomous(v{version}): {summary}'
prMode: multi
autoMergePRs: false
sourcing:
  lookbackDays: 7
  minProposalConfidence: 0.6
  includeTodoMarkers: true
  todoMarkerPattern: TODO\(autonomous\)|FIXME\(autonomous\)
testing:
  # Memory-adaptive + affected-test VERIFY runner (scripts/run-verify-tests.mjs).
  # Sizes vitest workers from live free memory, runs `vitest related` for the
  # cycle's affected tests with a full-suite DEEP GATE safety net (core-glob diff,
  # every Nth cycle, or unknown diff), and self-heals once on an OOM signature.
  # RealTestRunner appends `-- --reporter=json --outputFile <path>`; the runner
  # strips the separator and forwards those flags so it stays a drop-in.
  # NEVER pass --minWorkers — vitest 4.x rejects it with a fatal CACError.
  command: node scripts/run-verify-tests.mjs
  affectedMode: auto            # auto | related | full
  deepGateEveryNCycles: 5
  coreGlobs:
    - packages/core/src/runtime/**
    - packages/core/src/autonomous/**
    - packages/shared/**
  memory:
    reserveGb: 2.0
    perWorkerGb: 1.0
    heapCapMb: 2048
  timeoutMinutes: 20
  reporter: json
  saveRawLog: true
  # Known-flaky / environment-specific test files excluded from the PER-CHILD
  # scoped verify only (vitest --exclude). Cycle 4e451e22: `vitest related`
  # transitively pulled this darwin-only tmpdir-realpath test into 9 unrelated
  # children's runs and failed them. The cycle-level VERIFY still runs the FULL
  # suite with newFailures-vs-baseline semantics — nothing is skipped at release.
  knownFlakyTestFiles:
    - packages/cli/src/__tests__/autonomous-worktree.test.ts
  buildCommand: corepack pnpm build
  typeCheckCommand: corepack pnpm exec tsc -b --noEmit --pretty false
scoring:
  agentId: backlog-scorer
  maxRetries: 3
  fallbackToStatic: true
logging:
  logDir: .agentforge/cycles
  retainCycles: 50
retry:
  maxAutoRetries: 1
  requireApprovalAfter: 1
  reExecuteOnRetry: true
safety:
  stopFilePath: .agentforge/cycles/{cycleId}/STOP
  secretScanEnabled: true
  verifyCleanWorkingTreeBeforeStart: true
  workingTreeWhitelist:
    - .agentforge/cycles/**
    - .agentforge/audit.db-*
