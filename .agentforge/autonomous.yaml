runtime: codex-cli  # Execution transport mode: auto | sdk | cli | codex-cli | openai-sdk
effortCap: high     # High-throughput Codex preset while the Codex line is being hardened.
#   auto: registers all transports; preserves existing Anthropic/Claude preference.
#   sdk:  compatibility alias for anthropic-sdk.
#   cli:  compatibility alias for Claude Code CLI subprocess.
#   codex-cli: Codex CLI subprocess using the logged-in Codex account.
#   openai-sdk: OpenAI Responses API fallback using OPENAI_API_KEY.
#   Env var AGENTFORGE_RUNTIME overrides this field when both are set.
#   See docs/runtime-modes.md for full details.
budget:
  perCycleUsd: 200
  perItemUsd: 40
  perAgentUsd: 60
  allowOverageApproval: true
limits:
  maxItemsPerSprint: 1
  maxDurationMinutes: 180
  maxConsecutiveFailures: 5
  maxExecutePhaseFailureRate: 0.5
  maxExecutePhaseParallelism: 10
quality:
  testPassRateFloor: 0.95
  allowRegression: false
  requireBuildSuccess: true
  requireTypeCheckSuccess: true
git:
  branchPrefix: codex/
  baseBranch: main
  refuseCommitToBaseBranch: true
  includeDiagnosticBranchOnFailure: true
  maxFilesPerCommit: 100
pr:
  draft: false
  assignReviewer: seandonvaughan
  labelPrefix: autonomous
  labels:
    - autonomous
    - needs-review
  titleTemplate: 'autonomous(v{version}): {summary}'
prMode: multi
autoMergePRs: false
sourcing:
  lookbackDays: 7
  minProposalConfidence: 0.6
  includeTodoMarkers: true
  todoMarkerPattern: TODO\(autonomous\)|FIXME\(autonomous\)
testing:
  # NOTE: do NOT add --minWorkers — vitest 4.x rejects it with a fatal CACError
  # ("Unknown option --minWorkers") and aborts before any test runs, which fails
  # the VERIFY gate for every cycle of every size. --maxWorkers=2 is the OOM cap.
  command: corepack pnpm exec vitest run --maxWorkers=2
  timeoutMinutes: 20
  reporter: json
  saveRawLog: true
  buildCommand: corepack pnpm build
  typeCheckCommand: corepack pnpm exec tsc -b --noEmit --pretty false
scoring:
  agentId: backlog-scorer
  maxRetries: 3
  fallbackToStatic: true
logging:
  logDir: .agentforge/cycles
  retainCycles: 50
retry:
  maxAutoRetries: 1
  requireApprovalAfter: 1
  reExecuteOnRetry: true
safety:
  stopFilePath: .agentforge/cycles/{cycleId}/STOP
  secretScanEnabled: true
  verifyCleanWorkingTreeBeforeStart: true
  workingTreeWhitelist:
    - .agentforge/cycles/**
    - .agentforge/audit.db-*
