# Model Routing — AgentForge v3 Development Team
# Target: <15% Opus spend, >55% Haiku spend

opus:
  agents:
    - cto
    - vp-engineering
    - vp-product
    - lead-architect
  invocation_rules:
    - "Strategic decisions that shape the entire project"
    - "Cross-team architectural disputes"
    - "Milestone reviews and roadmap changes"
    - "Never for implementation or execution"
  estimated_spend_pct: 14

sonnet:
  agents:
    - core-platform-lead
    - type-system-designer
    - scanner-pipeline-designer
    - runtime-platform-lead
    - cost-engine-designer
    - experience-design-lead
    - cost-optimization-lead
    - agent-intelligence-lead
    - integration-architecture-lead
    - quality-assurance-lead
    - build-release-lead
    - feedback-analyst
  invocation_rules:
    - "Team coordination and design decisions within bounded scope"
    - "Code review requiring cross-module reasoning"
    - "Research synthesis and proposal evaluation"
    - "Test strategy and security analysis"
  estimated_spend_pct: 31

haiku:
